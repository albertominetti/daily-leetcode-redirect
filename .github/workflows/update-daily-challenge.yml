name: Update daily LeetCode redirect

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-daily-redirect
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch today's challenge and rebuild index.html
        run: bash scripts/sync-daily-challenge.sh

      - name: Commit and push if index.html changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Already up to date, nothing to commit."
          else
            git commit -m "chore: sync daily challenge ($(date -u +%F))"
            git push
          fi
